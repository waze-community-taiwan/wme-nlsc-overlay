name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump level (used when 'version' is empty)"
        required: false
        type: choice
        default: minor
        options:
          - patch
          - minor
          - major
      version:
        description: "Explicit version override (without leading v, e.g. 0.1.0). Leave empty to auto-bump from package.json."
        required: false
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Full history so the auto-bump path can push commits back to the branch.
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        # Runs before resolve-version so `npm version` can update
        # package-lock.json against the installed module tree.
        run: npm ci

      - name: Resolve version
        id: version
        run: |
          set -euo pipefail
          EVENT="${{ github.event_name }}"
          BUMP="${{ inputs.bump }}"
          OVERRIDE="${{ inputs.version }}"

          if [ "$EVENT" = "push" ]; then
            # Tag-push path: tag is authoritative, package.json on disk is
            # left untouched (it may drift from the tag — workflow_dispatch
            # is the supported path for keeping it synced).
            TAG="${GITHUB_REF_NAME}"
            VERSION="${TAG#v}"
            COMMIT_BACK="false"
          else
            # workflow_dispatch path. `npm version` writes both package.json
            # and package-lock.json; --no-git-tag-version skips commit/tag
            # (we do those explicitly later so they include metablock.json).
            if [ -n "$OVERRIDE" ]; then
              npm version "$OVERRIDE" --no-git-tag-version --allow-same-version >/dev/null
              VERSION="$OVERRIDE"
            else
              npm version "$BUMP" --no-git-tag-version >/dev/null
              VERSION=$(node -p "require('./package.json').version")
            fi
            TAG="v${VERSION}"
            COMMIT_BACK="true"
            if git rev-parse -q --verify "refs/tags/${TAG}" >/dev/null; then
              echo "::error::Tag ${TAG} already exists. Pick a different version or bump level."
              exit 1
            fi
          fi

          if ! printf '%s' "$VERSION" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+([.-].*)?$'; then
            echo "::error::Computed version '$VERSION' is not SemVer-ish."
            exit 1
          fi

          {
            echo "version=${VERSION}"
            echo "tag=${TAG}"
            echo "commit_back=${COMMIT_BACK}"
          } >> "$GITHUB_OUTPUT"
          echo "Resolved: VERSION=${VERSION} TAG=${TAG} COMMIT_BACK=${COMMIT_BACK}"

      - name: Run unit tests
        run: npm test

      - name: Sync metablock version
        run: |
          tmp=$(mktemp)
          jq --arg v "${{ steps.version.outputs.version }}" '.version = $v' metablock.json > "$tmp"
          mv "$tmp" metablock.json
          echo "metablock.json after sync:"
          cat metablock.json

      - name: Build userscript
        run: npm run build

      - name: Verify build artifact
        run: |
          test -f dist/wme-nlsc-overlay.user.js
          echo "Metablock header:"
          head -n 30 dist/wme-nlsc-overlay.user.js
          grep -q "^// @version *${{ steps.version.outputs.version }}$" dist/wme-nlsc-overlay.user.js

      - name: Commit bump and push tag
        if: steps.version.outputs.commit_back == 'true'
        env:
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          set -euo pipefail
          if [ "${GITHUB_REF_TYPE}" != "branch" ]; then
            echo "::error::workflow_dispatch ran on ${GITHUB_REF_TYPE} '${GITHUB_REF_NAME}', expected a branch."
            exit 1
          fi
          BRANCH="${GITHUB_REF_NAME}"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add package.json package-lock.json metablock.json
          if git diff --cached --quiet; then
            echo "No version changes to commit (idempotent re-run?)."
          else
            git commit -m "chore(release): ${TAG}"
            git push origin "HEAD:${BRANCH}"
          fi

          git tag -a "${TAG}" -m "Release ${TAG}"
          git push origin "${TAG}"

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          NOTES="Automated release of \`wme-nlsc-overlay.user.js\` version ${{ steps.version.outputs.version }}.

          **Install:** [\`wme-nlsc-overlay.user.js\`](https://github.com/${{ github.repository }}/releases/latest/download/wme-nlsc-overlay.user.js) — click the link with Tampermonkey/Violentmonkey/Greasemonkey installed.

          See [README](https://github.com/${{ github.repository }}#install-on-browser) for full install instructions."

          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" dist/wme-nlsc-overlay.user.js --clobber
            gh release edit "$TAG" --notes "$NOTES"
          else
            gh release create "$TAG" \
              dist/wme-nlsc-overlay.user.js \
              --title "$TAG" \
              --notes "$NOTES"
          fi
